<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart ERP Pro - Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/login.css">

</head>

<body>

    <!-- Animated Background -->
    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Login Container -->
    <div class="container">

        <div class="login-card">

            <!-- Logo -->
            <div class="logo">

                <i class="fa-solid fa-cubes"></i>

                <h1>Smart ERP Pro</h1>

                <p>Business Management System</p>

            </div>

            <!-- Login Form -->
            <form id="loginForm">

                <!-- Username -->
                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="username"
                        placeholder="Username"
                        autocomplete="username"
                        required>

                </div>

                <!-- Password -->
                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        autocomplete="current-password"
                        required>

                </div>

                <!-- Options -->
                <div class="options">

                    <label>

                        <input
                            type="checkbox"
                            id="rememberMe">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <!-- Show Password -->
                <div class="show-password">

                    <label>

                        <input
                            type="checkbox"
                            id="showPassword">

                        Show Password

                    </label>

                </div>

                <!-- Login Button -->
                <button
                    type="submit"
                    id="loginBtn"
                    class="login-btn">

                    <span id="loginText">

                        Login

                    </span>

                    <span
                        id="loader"
                        style="display:none;">

                        <i class="fa-solid fa-spinner fa-spin"></i>

                    </span>

                </button>

            </form>

            <!-- Footer -->

            <div class="footer">

                © 2026 Smart ERP Pro

            </div>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="assets/js/login.js"></script>

</body>

</html>
