<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart ERP Pro</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            font-family:Poppins,Arial,sans-serif;

            background:#0F172A;

            color:white;

            overflow:hidden;

        }

        .loader{

            text-align:center;

        }

        .spinner{

            width:70px;

            height:70px;

            border:7px solid rgba(255,255,255,.2);

            border-top:7px solid #2563EB;

            border-radius:50%;

            margin:auto;

            animation:spin 1s linear infinite;

        }

        h1{

            margin-top:25px;

            font-size:32px;

            letter-spacing:1px;

        }

        p{

            margin-top:10px;

            opacity:.7;

        }

        @keyframes spin{

            100%{

                transform:rotate(360deg);

            }

        }

    </style>

</head>

<body>

<div class="loader">

<div class="spinner"></div>

<h1>Smart ERP Pro</h1>

<p>Loading...</p>

</div>

<script>

const loggedIn = localStorage.getItem("loggedIn");

setTimeout(()=>{

    if(loggedIn==="true"){

        window.location.href="dashboard.html";

    }

    else{

        window.location.href="login.html";

    }

},1500);

</script>

</body>

</html>
